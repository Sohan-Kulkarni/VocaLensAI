services:
  backend:
    build:
      context: ./backend
    container_name: vocalens-backend
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=sqlite:///./storage/vocalens.db
    ports:
      - "8000:8000"
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/reports:/app/reports
      - vocalens_storage:/app/storage

  frontend:
    build:
      context: ./frontend
    container_name: vocalens-frontend
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  vocalens_storage:
